# =================================================================
# Configuración de Eclipse Mosquitto para Control Acceso Vehicular
# =================================================================

# Puerto por defecto para escuchar clientes no encriptados
listener 1883 0.0.0.0

# Permitir conexiones anónimas para entornos de pruebas locales
# (En producción local, cambiar a false y usar password_file)
allow_anonymous true

# Configuración de logs para diagnóstico
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Persistencia de base de datos en disco
persistence true
persistence_location /var/lib/mosquitto/
